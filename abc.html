<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hippo · recall</title>
<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --ink: #1d2026;
    --ink-soft: #50555f;
    --muted: #8b919c;
    --line: #e7e9ee;
    --line-strong: #d8dbe2;
    --accent: #5b5bd6;
    --accent-soft: #eeeefc;
    --accent-ink: #4543b8;
    --ok: #2bb673;
    --bad: #e5484d;
    --shadow-sm: 0 1px 2px rgba(20, 22, 30, 0.04), 0 1px 3px rgba(20, 22, 30, 0.06);
    --shadow-md: 0 4px 14px rgba(20, 22, 30, 0.06), 0 1px 3px rgba(20, 22, 30, 0.05);
    --radius: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171c; --surface: #1c1f26; --ink: #eceef2; --ink-soft: #b7bcc6;
      --muted: #7c828d; --line: #282c34; --line-strong: #333843;
      --accent: #8a8aff; --accent-soft: #23243a; --accent-ink: #b3b3ff;
      --shadow-sm: none; --shadow-md: 0 6px 20px rgba(0,0,0,.35);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 56px 24px 96px; }

  header { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
  .mark { font-size: 17px; font-weight: 650; letter-spacing: -0.01em; }
  .mark .accent { color: var(--accent); }
  .status { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--muted); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; }
  .dot.ok { background: var(--ok); }
  .dot.bad { background: var(--bad); }

  .field {
    display: flex; align-items: flex-end; gap: 10px;
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: var(--radius); padding: 10px 10px 10px 16px;
    box-shadow: var(--shadow-sm); transition: border-color .15s, box-shadow .15s;
  }
  .field:focus-within { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
  .field textarea {
    flex: 1; border: 0; outline: 0; resize: none; background: transparent; color: var(--ink);
    font: inherit; line-height: 1.55; padding: 6px 0; max-height: 180px;
  }
  .field textarea::placeholder { color: var(--muted); }
  .ask {
    flex: none; border: 0; cursor: pointer; background: var(--accent); color: #fff;
    font: inherit; font-weight: 600; font-size: 14px; padding: 9px 18px; border-radius: 10px;
    transition: background .15s, opacity .15s; align-self: stretch;
  }
  .ask:hover { background: var(--accent-ink); }
  .ask:disabled { opacity: .45; cursor: default; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 2px 0; }
  .chip {
    border: 1px solid var(--line); background: var(--surface); color: var(--ink-soft);
    font-size: 13px; padding: 6px 13px; border-radius: 999px; cursor: pointer;
    transition: .15s; box-shadow: var(--shadow-sm);
  }
  .chip:hover { color: var(--accent); border-color: var(--accent); }

  .result { margin-top: 36px; }

  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius);
    box-shadow: var(--shadow-md); padding: 26px 28px; animation: fade .4s ease both;
  }
  .meta {
    font-size: 12px; color: var(--muted); letter-spacing: .02em;
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .meta .pip { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

  .metrics {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin: 18px 0 0; padding-top: 14px; border-top: 1px solid var(--line);
  }
  .metric {
    display: flex; flex-direction: column; gap: 2px;
    padding: 8px 12px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--bg); min-width: 96px;
  }
  .metric .label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); font-weight: 600;
  }
  .metric .value {
    font-size: 15px; font-weight: 600; color: var(--ink);
    font-variant-numeric: tabular-nums;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .metric.total { border-color: var(--accent); background: var(--accent-soft); }
  .metric.total .value { color: var(--accent-ink); }
  .metric .bar {
    margin-top: 4px; height: 3px; border-radius: 2px;
    background: color-mix(in srgb, var(--accent) 25%, transparent);
    overflow: hidden;
  }
  .metric .bar span { display: block; height: 100%; background: var(--accent); border-radius: 2px; }
  .prose { color: var(--ink); font-size: 16px; line-height: 1.65; }
  .prose > p:first-child { font-size: 16.5px; color: var(--ink); margin: 0 0 16px; }
  .prose p { margin: 0 0 12px; }
  .prose p:last-child { margin-bottom: 0; }
  .prose ul { margin: 0; padding: 0; list-style: none; }
  .prose li {
    position: relative; padding: 11px 0 11px 20px; margin: 0;
    border-top: 1px solid var(--line); line-height: 1.6;
  }
  .prose li:first-child { border-top: 0; }
  .prose li::before {
    content: ""; position: absolute; left: 2px; top: 19px;
    width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
  }
  .prose li strong:first-child { color: var(--ink); font-weight: 640; }
  .prose ul + p { margin-top: 16px; }
  .prose strong { font-weight: 640; }
  .prose code {
    background: var(--accent-soft); color: var(--accent-ink);
    padding: 1px 6px; border-radius: 6px; font-size: 14px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }

  .sources { margin-top: 30px; }
  .sources h2 {
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0 0 4px; padding: 0 2px;
  }
  .src {
    display: grid; grid-template-columns: 64px 1fr; gap: 14px; align-items: baseline;
    padding: 14px 2px; border-bottom: 1px solid var(--line);
    animation: fade .4s ease both;
  }
  .src:last-child { border-bottom: 0; }
  .src .when { font-size: 12.5px; color: var(--muted); font-variant-numeric: tabular-nums; padding-top: 1px; }
  .src .title { font-size: 14.5px; font-weight: 560; color: var(--ink); }
  .src .tagline { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .src .tagline .sep { opacity: .5; margin: 0 6px; }
  .src .body { font-size: 13.5px; color: var(--ink-soft); line-height: 1.6; margin-top: 7px;
               max-height: 0; overflow: hidden; transition: max-height .25s ease; white-space: pre-wrap; }
  .src.open .body { max-height: 600px; }
  .src .toggle { font-size: 12.5px; color: var(--accent); cursor: pointer; margin-top: 7px; display: inline-block; user-select: none; }

  .loading { display: flex; align-items: center; gap: 12px; color: var(--ink-soft); font-size: 14.5px; padding: 8px 2px; }
  .pulse { display: flex; gap: 5px; }
  .pulse span { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .35; animation: bounce 1.1s infinite ease-in-out; }
  .pulse span:nth-child(2) { animation-delay: .18s; }
  .pulse span:nth-child(3) { animation-delay: .36s; }
  .error { color: var(--bad); background: color-mix(in srgb, var(--bad) 8%, transparent);
           border: 1px solid color-mix(in srgb, var(--bad) 25%, transparent);
           padding: 14px 16px; border-radius: 12px; font-size: 14.5px; }

  footer { margin-top: 56px; text-align: center; color: var(--muted); font-size: 12px; }

  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes bounce { 0%, 80%, 100% { opacity: .25; transform: scale(.85); } 40% { opacity: 1; transform: scale(1); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="mark">hippo<span class="accent"> · recall</span></span>
    <span class="status" id="status"><span class="dot" id="dot"></span><span id="statusText">connecting</span></span>
  </header>

  <div class="field">
    <textarea id="q" rows="1" placeholder="Ask about your work…"></textarea>
    <button class="ask" id="ask">Ask</button>
  </div>
  <div class="chips" id="chips">
    <button class="chip" data-q="What did I do today?">Today</button>
    <button class="chip" data-q="What did I work on yesterday?">Yesterday</button>
    <button class="chip" data-q="When was I working on MLX?">MLX</button>
    <button class="chip" data-q="Summarize my coding sessions">Coding</button>
    <button class="chip" data-q="What did I discuss with AI assistants?">AI chats</button>
  </div>

  <div class="result" id="result"></div>
  <footer>grounded in your activity memory · hippo-mem</footer>
</div>

<script>
const $ = (id) => document.getElementById(id);
const result = $("result");
const qBox = $("q");

qBox.addEventListener("input", () => {
  qBox.style.height = "auto";
  qBox.style.height = Math.min(qBox.scrollHeight, 180) + "px";
});

async function checkHealth() {
  try {
    const h = await (await fetch("/api/health")).json();
    const ok = h.hydradb_configured && h.llm_configured;
    $("dot").className = "dot " + (ok ? "ok" : "bad");
    $("statusText").textContent = ok ? h.tenant_id : "missing keys";
  } catch {
    $("dot").className = "dot bad";
    $("statusText").textContent = "offline";
  }
}

const esc = (s) => s.replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
const inline = (s) =>
  s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/`(.+?)`/g, "<code>$1</code>");

function renderProse(text) {
  const lines = esc(text).split("\n");
  let html = "", inList = false;
  for (const line of lines) {
    let t = line.trim();
    t = t.replace(/^#{1,6}\s+/, ""); // demote stray headings to plain text
    if (/^[-*]\s+/.test(t)) {
      if (!inList) { html += "<ul>"; inList = true; }
      html += "<li>" + inline(t.replace(/^[-*]\s+/, "")) + "</li>";
    } else {
      if (inList) { html += "</ul>"; inList = false; }
      if (t) html += "<p>" + inline(t) + "</p>";
    }
  }
  if (inList) html += "</ul>";
  return html;
}

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return iso;
  return d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }).toLowerCase().replace(" ", "");
}

function fmtMs(ms) {
  if (ms == null) return "—";
  if (ms < 1000) return `${ms} ms`;
  return `${(ms / 1000).toFixed(2)} s`;
}

function renderMetrics(t) {
  if (!t) return "";
  const total = Math.max(1, t.total_ms || 0);
  const recallPct = Math.min(100, Math.round((t.recall_ms / total) * 100));
  const llmPct = Math.min(100, Math.round((t.llm_ms / total) * 100));
  return `
    <div class="metrics" title="Time breakdown for this answer">
      <div class="metric">
        <span class="label">Retrieve</span>
        <span class="value">${fmtMs(t.recall_ms)}</span>
        <div class="bar"><span style="width:${recallPct}%"></span></div>
      </div>
      <div class="metric">
        <span class="label">Synthesize</span>
        <span class="value">${fmtMs(t.llm_ms)}</span>
        <div class="bar"><span style="width:${llmPct}%"></span></div>
      </div>
      <div class="metric total">
        <span class="label">Total</span>
        <span class="value">${fmtMs(t.total_ms)}</span>
        <div class="bar"><span style="width:100%"></span></div>
      </div>
    </div>`;
}

function renderSources(sources) {
  if (!sources.length) return "";
  let rows = "";
  for (const s of sources) {
    const when = fmtTime(s.start_time) || s.local_date || "";
    const tags = [];
    if (s.ai_platform) tags.push(esc(s.ai_platform));
    else if (s.activity_type) tags.push(esc(s.activity_type.replace(/_/g, " ")));
    const ents = (s.entities || []).slice(0, 3).map(esc);
    const tagline = [...tags, ...ents].join('<span class="sep">·</span>');
    rows += `
      <div class="src">
        <div class="when">${esc(when)}</div>
        <div>
          <div class="title">${esc(s.title)}</div>
          ${tagline ? `<div class="tagline">${tagline}</div>` : ""}
          <div class="body">${esc(s.summary)}</div>
          <span class="toggle">Details</span>
        </div>
      </div>`;
  }
  return `<div class="sources"><h2>Drawn from ${sources.length} ${sources.length === 1 ? "memory" : "memories"}</h2>${rows}</div>`;
}

let timerId = null;
function startTimer() {
  const t0 = Date.now();
  const stage = (s) => s < 4 ? "Searching your memory" : s < 8 ? "Reading what it found" : "Putting it together";
  const tick = () => {
    const s = Math.floor((Date.now() - t0) / 1000);
    const el = $("loadmsg");
    if (el) el.textContent = `${stage(s)} · ${s}s`;
  };
  tick();
  timerId = setInterval(tick, 250);
}
function stopTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

function bindToggles() {
  document.querySelectorAll(".src .toggle").forEach((el) => {
    const card = el.closest(".src");
    el.onclick = () => {
      card.classList.toggle("open");
      el.textContent = card.classList.contains("open") ? "Hide" : "Details";
    };
  });
}

async function ask() {
  const question = qBox.value.trim();
  if (!question) return;
  $("ask").disabled = true;
  result.innerHTML = `<div class="loading"><span class="pulse"><span></span><span></span><span></span></span><span id="loadmsg">Searching your memory</span></div>`;
  startTimer();
  try {
    const r = await fetch("/api/query", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    const data = await r.json();
    if (!r.ok) {
      result.innerHTML = `<div class="error">${esc(data.error || "Something went wrong.")}</div>`;
      return;
    }
    const scope = data.used_date_filter ? data.used_date_filter : "across your activity";
    const meta = `<span class="pip"></span>${data.recall_count} ${data.recall_count === 1 ? "memory" : "memories"} · ${esc(scope)}`;
    result.innerHTML = `
      <div class="card"><div class="meta">${meta}</div><div class="prose">${renderProse(data.answer)}</div>${renderMetrics(data.timings)}</div>
      ${renderSources(data.sources)}`;
    bindToggles();
  } catch (e) {
    result.innerHTML = `<div class="error">Couldn't reach the server: ${esc(String(e))}</div>`;
  } finally {
    stopTimer();
    $("ask").disabled = false;
  }
}

$("ask").onclick = ask;
qBox.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); ask(); }
});
$("chips").addEventListener("click", (e) => {
  const chip = e.target.closest(".chip");
  if (chip) { qBox.value = chip.dataset.q; ask(); }
});

checkHealth();
qBox.focus();
</script>
</body>
</html>
